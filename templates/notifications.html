{% extends 'base.html' %}

{% block content %}

🔔 Notifications

</h2>

{% for n in notifications %}

<div
class="glass p-5 rounded-2xl mb-4 shadow">

<p>

{{ n.message }}

</p>

<p class="text-xs text-gray-500 mt-2">

{{ n.created_at }}

</p>

</div>

{% endfor %}

{% endblock %}
