{% extends 'base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <h2 class="text-3xl font-bold text-[#1E3A5F] mb-8">
        👤 My Profile
    </h2>

    <div class="bg-white rounded-3xl shadow-lg p-8">

        <form method="POST">

            <div class="grid md:grid-cols-2 gap-6">

                <div>
                    <label class="block mb-2 font-semibold">
                        Full Name
                    </label>

                    <input
                        type="text"
                        name="full_name"
                        value="{{ user.full_name }}"
                        required
                        class="w-full border rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block mb-2 font-semibold">
                        Username
                    </label>

                    <input
                        type="text"
                        value="{{ user.username }}"
                        disabled
                        class="w-full border rounded-xl px-4 py-3 bg-gray-100">
                </div>

                <div>
                    <label class="block mb-2 font-semibold">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        value="{{ user.email }}"
                        class="w-full border rounded-xl px-4 py-3">
                </div>

                <div>
                    <label class="block mb-2 font-semibold">
                        Phone
                    </label>

                    <input
                        type="text"
                        name="phone"
                        value="{{ user.phone }}"
                        class="w-full border rounded-xl px-4 py-3">
                </div>

            </div>

            <div class="mt-6">

                <label class="block mb-2 font-semibold">
                    Address
                </label>

                <textarea
                    name="address"
                    rows="3"
                    class="w-full border rounded-xl px-4 py-3">{{ user.address }}</textarea>

            </div>

            <button
                class="mt-8 bg-[#1E3A5F] text-white px-8 py-3 rounded-xl hover:scale-105 transition">

                Save Changes

            </button>

        </form>

    </div>

</div>

{% endblock %}
