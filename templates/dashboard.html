{% extends 'base.html' %}

{% block content %}

<h2 class="text-3xl font-bold text-[#1E3A5F] mb-8">
Dashboard
</h2>

<div class="grid md:grid-cols-3 lg:grid-cols-6 gap-6">

<div class="glass p-6 rounded-3xl shadow">
<p>Total Books</p>
<h3 class="text-4xl font-bold mt-2">
{{ total_books }}
</h3>
</div>

<div class="glass p-6 rounded-3xl shadow">
<p>Users</p>
<h3 class="text-4xl font-bold mt-2">
{{ total_users }}
</h3>
</div>

<div class="glass p-6 rounded-3xl shadow">
<p>Borrowed</p>
<h3 class="text-4xl font-bold mt-2">
{{ total_borrow }}
</h3>
</div>

<div class="glass p-6 rounded-3xl shadow">
<p>Overdue</p>
<h3 class="text-4xl font-bold mt-2 text-red-500">
{{ overdue }}
</h3>
</div>

<div class="glass p-6 rounded-3xl shadow">
<p>Categories</p>
<h3 class="text-4xl font-bold mt-2">
{{ total_categories }}
</h3>
</div>

<div class="glass p-6 rounded-3xl shadow">
<p>Notifications</p>
<h3 class="text-4xl font-bold mt-2">
{{ total_notifications }}
</h3>
</div>

</div>

{% endblock %}
