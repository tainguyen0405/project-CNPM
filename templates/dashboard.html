{% extends 'base.html' %}
{% block content %}
<h2 class="text-2xl font-bold text-[#1E3A5F] mb-8">Dashboard</h2>

<div class="grid grid-cols-2 gap-6 lg:grid-cols-4" id="stats">
  <div class="bg-white rounded-2xl p-6 shadow-sm">
    <p class="text-gray-400 text-sm">Tổng sách</p>
    <p class="text-3xl font-bold text-[#1E3A5F] mt-1">{{ total_books }}</p>
  </div>
  <div class="bg-white rounded-2xl p-6 shadow-sm">
    <p class="text-gray-400 text-sm">Người dùng</p>
    <p class="text-3xl font-bold text-[#1E3A5F] mt-1">{{ total_users }}</p>
  </div>
  <div class="bg-white rounded-2xl p-6 shadow-sm">
    <p class="text-gray-400 text-sm">Đang mượn</p>
    <p class="text-3xl font-bold text-blue-500 mt-1">{{ total_borrow }}</p>
  </div>
  <div class="bg-white rounded-2xl p-6 shadow-sm">
    <p class="text-gray-400 text-sm">Quá hạn</p>
    <p class="text-3xl font-bold text-red-500 mt-1">{{ overdue }}</p>
  </div>
</div>

<script>
  gsap.from("#stats .bg-white", {
    y: 30, opacity: 0, duration: 0.5,
    stagger: 0.1, ease: "power2.out", delay: 0.2
  });
</script>
{% endblock %}
