{% extends 'base.html' %}

{% block content %}

<h2 class="text-3xl font-bold text-[#1E3A5F] mb-8">
🔒 Change Password
</h2>

<div
id="password-card"
class="
glass
max-w-2xl
bg-white
rounded-3xl
p-8
shadow-lg
">

<form
method="POST"
action="/change-password"
class="space-y-6">

<div>
<label class="block mb-2 font-medium">
Current Password
</label>

<input
type="password"
name="old_password"
required
class="
w-full
border
rounded-xl
p-3
focus:outline-none
focus:ring-2
focus:ring-blue-500
">
</div>


<div>
<label class="block mb-2 font-medium">
New Password
</label>

<input
type="password"
name="new_password"
required
class="
w-full
border
rounded-xl
p-3
focus:outline-none
focus:ring-2
focus:ring-blue-500
">
</div>


<button
type="submit"
class="
bg-[#1E3A5F]
text-white
px-6
py-3
rounded-xl
hover:opacity-90
">

Update Password

</button>

</form>

</div>

<script>

gsap.from(
"#password-card",
{
y:40,
opacity:0,
duration:1
}
);

</script>

{% endblock %}
